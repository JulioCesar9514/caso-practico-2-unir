<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNIR - Caso Práctico 2</title>
    
    <style>
        /* Variables de color globales */
        :root {
            --bg-color: #f0f4f8; /* Azul clarito y suave de fondo */
            --card-bg: #ffffff;
            --text-main: #2d3748;
            --text-muted: #627285;
            --accent-color: #e53e3e; /* Rojo UNIR */
            --badge-auth: #edf2f7;
            --badge-auth-text: #4a5568;
            --badge-secure: #ebf8ff;
            --badge-secure-text: #2b6cb0;
            --badge-secure-border: #bee3f8;
        }

        /* Reset básico y centrado absoluto */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            /* Tipografías del sistema: limpias, modernas y sin descargas externas */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Contenedor principal estilo tarjeta */
        .card {
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05); /* Sombra más suave para fondo claro */
            padding: 40px 30px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            border: 1px solid #e2e8f0;
        }

        /* Identificador de la universidad (Línea decorativa) */
        .brand-line {
            width: 60px;
            height: 4px;
            background-color: var(--accent-color);
            margin: 0 auto 24px auto;
            border-radius: 2px;
        }

        /* Título principal */
        h1 {
            color: var(--text-main);
            font-size: 1.8rem;
            font-weight: 700;
            line-height: 1.3;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        /* Descripción del caso */
        p {
            color: var(--text-muted);
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        /* Badges informativos del servidor */
        .status-container {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .badge {
            background-color: var(--badge-auth);
            color: var(--badge-auth-text);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .badge.secure {
            background-color: var(--badge-secure);
            color: var(--badge-secure-text);
            border: 1px solid var(--badge-secure-border);
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="brand-line"></div>
        <h1>Hola UNIR – Caso Práctico 2</h1>
        <p>Servidor web con HTTPS y autenticación básica.</p>
        
        <!-- Elementos visuales que demuestran el cumplimiento técnico del caso -->
        <div class="status-container">
            <span class="badge secure">🔒 HTTPS Activo</span>
            <span class="badge">👤 Autenticación Básica</span>
        </div>
    </div>

</body>
</html>
